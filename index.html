<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:#f3eee8; /* disesuaikan sama surat */
}

/* glow soft (bukan pink) */
.glow{
  position:absolute;
  width:300px;
  height:300px;
  background:#e7dccf;
  border-radius:50%;
  filter:blur(120px);
  opacity:.6;
}

/* GIFT */
.giftScreen{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#f3eee8;
  z-index:200;
}

.giftBox{
  font-size:90px;
  cursor:pointer;
}

.giftText{
  margin-top:12px;
  color:#7a5c52;
  font-size:14px;
}

/* LOADING */
.loadingScreen{
  position:absolute;
  inset:0;
  background:#f6f1ec;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:170;
}

.loader{
  width:45px;
  height:45px;
  border:4px solid #d8c9bb;
  border-top:4px solid #9b7b6b;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* PASSWORD */
.lockScreen{
  position:absolute;
  inset:0;
  background:#f3eee8;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99;
}

.lockBox{
  width:280px;
  background:#fff;
  padding:28px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,.1);
  text-align:center;
}

.lockBox h2{
  font-family:'Parisienne',cursive;
  font-size:38px;
  color:#7a5c52;
  margin-bottom:15px;
}

.lockBox input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#f5efe9;
  outline:none;
  margin-bottom:12px;
}

.lockBox button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#b79b88;
  color:white;
  cursor:pointer;
}

/* ENVELOPE */
.envScreen{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
}

.envelope{
  width:300px;
  height:200px;
  background:#fff;
  border-radius:12px;
  position:relative;
  cursor:pointer;
  box-shadow:0 15px 40px rgba(0,0,0,.1);
}

/* flap */
.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:#eee2d8;
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER IMAGE */
.letter{
  position:absolute;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  display:none;
}

.letter img{
  width:320px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

/* download hint */
.hint{
  margin-top:10px;
  text-align:center;
  font-size:12px;
  color:#7a5c52;
}

</style>
</head>

<body>

<div class="glow"></div>

<!-- GIFT -->
<div class="giftScreen" id="giftScreen">
  <div class="giftBox" onclick="openGift()">🎁</div>
  <div class="giftText">tap the gift ♡</div>
</div>

<!-- LOADING -->
<div class="loadingScreen" id="loadingScreen">
  <div class="loader"></div>
</div>

<!-- PASSWORD -->
<div class="lockScreen" id="lockScreen">
  <div class="lockBox">
    <h2>for you ♡</h2>
    <input type="password" id="password" placeholder="enter password">
    <button onclick="checkPassword()">open</button>
  </div>
</div>

<!-- ENVELOPE -->
<div class="envScreen" id="envScreen">

  <div class="envelope" onclick="openLetter()"></div>

  <div class="letter" id="letter">
    <img src="https://files.catbox.moe/5jqk3h.png">
    <div class="hint">screenshot this letter ♡</div>
  </div>

</div>

<script>

let opened = false;

/* FLOW */
function openGift(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("loadingScreen").style.display="flex";

  setTimeout(()=>{
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("lockScreen").style.display="flex";
  },2500);
}

/* PASSWORD */
function checkPassword(){
  const pass = document.getElementById("password").value;

  if(pass === "zaki"){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("envScreen").style.display="flex";
  } else {
    alert("wrong password");
  }
}

/* OPEN LETTER */
function openLetter(){
  if(opened) return;
  opened = true;

  document.getElementById("letter").style.display="block";
}

</script>

</body>
</html>
