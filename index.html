<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you ♡</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#f7efe9;
  font-family:sans-serif;
}

/* SCREEN */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

/* FIRST SCREEN */
#giftScreen{display:flex;}

/* GIFT */
.gift{
  width:160px;
  height:160px;
  background:#ffb6c1;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:60px;
  cursor:pointer;
}

/* PASSWORD */
.box{
  width:280px;
  padding:25px;
  background:white;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#c9a38b;
  color:white;
}

/* WRAPPER */
.wrapper{
  width:320px;
  height:240px;
  position:relative;
}

/* ENVELOPE (PASTI KENA CLICK) */
.envelope{
  width:100%;
  height:180px;
  background:white;
  border-radius:12px;
  position:absolute;
  bottom:0;

  cursor:pointer;
  z-index:10; /* 🔥 penting biar bisa diklik */

  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* flap */
.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:#f1e2d8;
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER */
.letter{
  position:absolute;
  left:50%;
  bottom:10px;

  transform:translateX(-50%);
  display:none;

  z-index:5;
}

.letter img{
  width:340px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

</style>
</head>

<body>

<!-- 🎁 GIFT -->
<div class="screen" id="giftScreen">
  <div onclick="toPW()">
    <div class="gift">🎁</div>
  </div>
</div>

<!-- 🔒 PASSWORD -->
<div class="screen" id="pwScreen">
  <div class="box">
    <p>enter password</p>
    <input id="pw" type="password">
    <button onclick="check()">open</button>
  </div>
</div>

<!-- 💌 ENVELOPE -->
<div class="screen" id="envScreen">

  <div class="wrapper">

    <!-- 🔥 CLICK AREA BESAR -->
    <div class="envelope" onclick="openLetter()"></div>

    <!-- SURAT -->
    <div class="letter" id="letter">
      <img src="https://files.catbox.moe/5jqk3h.png">
    </div>

  </div>

</div>

<script>

/* FLOW */
function toPW(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("pwScreen").style.display="flex";
}

function check(){
  let pw=document.getElementById("pw").value;

  if(pw==="zaki"){
    document.getElementById("pwScreen").style.display="none";
    document.getElementById("envScreen").style.display="flex";
  }else{
    alert("wrong password");
  }
}

/* OPEN LETTER */
function openLetter(){
  document.getElementById("letter").style.display="block";
}

</script>

</body>
</html>
