<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you ♡</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#f7efe9;
  font-family:sans-serif;
  overflow:hidden;
}

/* SCREEN */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

#giftScreen{display:flex;}

/* GIFT */
.gift{
  width:160px;
  height:160px;
  background:#ffb6c1;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:60px;
  cursor:pointer;
}

/* PASSWORD */
.box{
  width:280px;
  padding:25px;
  background:white;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#c9a38b;
  color:white;
}

/* LOADING */
.loadingBox{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.loader{
  width:45px;
  height:45px;
  border:4px solid #eee;
  border-top:4px solid #c9a38b;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

#loadingText{
  font-size:14px;
  color:#333;
}

/* WRAPPER */
.wrapper{
  width:320px;
  height:240px;
  position:relative;
}

/* ENVELOPE */
.envelope{
  width:100%;
  height:180px;
  background:white;
  border-radius:12px;
  position:absolute;
  bottom:0;
  cursor:pointer;
  z-index:10;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:#f1e2d8;
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER */
.letter{
  position:absolute;
  left:50%;
  bottom:10px;
  transform:translateX(-50%) scaleY(0);
  transform-origin:bottom;
  opacity:0;
  transition:0.6s ease;
  z-index:20;
}

.letter.show{
  transform:translateX(-50%) translateY(-40px) scaleY(1);
  opacity:1;
}

.letter img{
  width:340px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* DOWNLOAD */
.downloadBtn{
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#c9a38b;
  color:white;
  font-size:12px;
  cursor:pointer;
  display:none;
}

.letter.show .downloadBtn{
  display:block;
}

/* FLOWERS */
.flower{
  position:fixed;
  top:-20px;
  font-size:18px;
  opacity:0.8;
  animation:fall linear infinite;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-10vh) rotate(0deg);}
  100%{transform:translateY(110vh) rotate(360deg);}
}

</style>
</head>

<body>

<!-- 🌸 FLOWERS -->
<div class="flowers"></div>

<!-- 🎁 GIFT -->
<div class="screen" id="giftScreen">
  <div onclick="toPW()">
    <div class="gift">🎁</div>
  </div>
</div>

<!-- 🔒 PASSWORD -->
<div class="screen" id="pwScreen">
  <div class="box">
    <p>enter password</p>
    <input id="pw" type="password">
    <button onclick="check()">open</button>
  </div>
</div>

<!-- ⏳ LOADING -->
<div class="screen" id="loadingScreen">
  <div class="loadingBox">
    <div class="loader"></div>
    <p id="loadingText"></p>
  </div>
</div>

<!-- 💌 ENVELOPE -->
<div class="screen" id="envScreen">
  <div class="wrapper">

    <div class="envelope" onclick="toggleLetter()"></div>

    <div class="letter" id="letter">
      <img src="https://files.catbox.moe/5jqk3h.png">

      <button class="downloadBtn" onclick="downloadLetter()">
        tap to download this letter
      </button>
    </div>

  </div>
</div>

<script>

/* FLOW */
function toPW(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("pwScreen").style.display="flex";
}

function check(){
  let pw=document.getElementById("pw").value;

  if(pw.trim().toLowerCase()==="zaki"){
    
    document.getElementById("pwScreen").style.display="none";
    document.getElementById("loadingScreen").style.display="flex";

    document.getElementById("loadingText").innerHTML = "";
    i = 0;
    typeLoading();

    setTimeout(()=>{
      document.getElementById("loadingScreen").style.display="none";
      document.getElementById("envScreen").style.display="flex";
    },3000);

  }else{
    alert("wrong password");
  }
}

/* TYPING LOADING */
const text = "sabar ya sayang, loading dulu ♡";
let i = 0;

function typeLoading(){
  const el = document.getElementById("loadingText");

  if(i < text.length){
    el.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeLoading, 60);
  }
}

/* LETTER TOGGLE */
let opened=false;

function toggleLetter(){
  const letter=document.getElementById("letter");

  if(!opened){
    letter.style.display="block";
    setTimeout(()=>{
      letter.classList.add("show");
    },50);
    opened=true;
  }else{
    letter.classList.remove("show");

    setTimeout(()=>{
      letter.style.display="none";
    },600);

    opened=false;
  }
}

/* DOWNLOAD */
function downloadLetter(){
  const link=document.createElement("a");
  link.href="https://files.catbox.moe/5jqk3h.png";
  link.download="my-letter.png";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* FLOWERS */
function createFlowers(){
  const container=document.querySelector(".flowers");

  for(let i=0;i<10;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.innerHTML="🌸";

    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=(4+Math.random()*3)+"s";
    f.style.fontSize=(14+Math.random()*10)+"px";

    container.appendChild(f);
  }
}

createFlowers();

</script>

</body>
</html>
