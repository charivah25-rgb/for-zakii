<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f2ee; /* netral cream-grey */
  font-family:sans-serif;
}

/* ENVELOPE */
.envelope{
  width:260px;
  height:170px;
  background:#ffffff;
  border-radius:10px;
  box-shadow:0 18px 35px rgba(0,0,0,0.12);
  position:relative;
  cursor:pointer;
}

/* flap */
.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#e8e5df,#dcd8d0);
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER OVERLAY */
.letter{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  padding:20px;
}

.letter.show{
  display:flex;
}

/* CARD */
.card{
  background:#ffffff;
  padding:16px;
  border-radius:12px;
  max-width:90%;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* IMAGE SURAT */
.card img{
  width:100%;
  border-radius:10px;
}

/* BUTTON */
button{
  margin-top:12px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#3a3a3a;
  color:white;
  cursor:pointer;
  font-size:13px;
}

button:hover{
  opacity:0.85;
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="envelope" onclick="openLetter()"></div>

<!-- LETTER -->
<div class="letter" id="letter">

  <div class="card">

    <img src="https://files.catbox.moe/5jqk3h.png">

    <button onclick="downloadLetter()">
      download this letter
    </button>

  </div>

</div>

<script>

function openLetter(){
  document.getElementById("letter").classList.add("show");
}

/* DOWNLOAD */
function downloadLetter(){
  const link = document.createElement("a");
  link.href = "https://files.catbox.moe/5jqk3h.png";
  link.download = "letter.png";
  link.click();
}

</script>

</body>
</html>
