<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Letter For You</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Parisienne&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      background: linear-gradient(180deg,#ffeef5,#fff6f9);
      font-family:'Cormorant Garamond', serif;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      color:#7c314f;
    }

    .page{
      width:100%;
      max-width:400px;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    h1{font-size:40px;margin-bottom:15px;}

    .sub{opacity:.7;margin-bottom:20px;}

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:20px;
      text-align:center;
      font-size:16px;
      margin-bottom:15px;
    }

    button{
      background:#c95c84;
      color:white;
      border:none;
      padding:12px 25px;
      border-radius:30px;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{transform:scale(1.05);}

    .hidden{display:none;}

    .envelope{
      width:280px;
      height:180px;
      background:#ffd8e6;
      border-radius:12px;
      position:relative;
      cursor:pointer;
    }

    .seal{
      width:50px;height:50px;
      background:#c21f5c;
      border-radius:50%;
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .letter{
       width:90%;
       max-width:360px;
       max-height:75vh;
       background: #fffdfb;
       padding:30px 25px;
       border-radius:18px;
       overflow-y:auto;
       box-shadow:0 15px 40px rgba(0,0,0,.12);
       text-align:left;

  /* biar kayak kertas */
       background-image: linear-gradient(#fffdfb 95%, #f3e6ec 100%);
       background-size: 100% 28px;
       line-height: 28px;
    }

    .title{
      font-family:'Parisienne', cursive;
      font-size:35px;
      margin-bottom:15px;
    }

    .text{
      font-size:18px;
      line-height:1.8;
      white-space:pre-line;
    }

    .signature{
      margin-top:30px;
      font-family:'Parisienne', cursive;
      font-size:28px;
      text-align:center;
    }

    .tap{margin-top:15px;opacity:.7;}
  </style>
</head>

<body>

<!-- PASSWORD PAGE -->
<div class="page" id="passwordPage">

  <h1>KEY TO MY HEART</h1>
  <p class="sub">Masukkan kata sandi</p>

  <input type="password" id="passwordInput" placeholder="•••••" autocomplete="off">

  <button onclick="checkPassword()">Unlock ♡</button>

</div>

<!-- ENVELOPE PAGE -->
<div class="page hidden" id="envelopePage">

  <h1>A LETTER FOR YOU</h1>

  <div class="envelope" onclick="openLetter()">
    <div class="seal">♡</div>
  </div>

  <p class="tap">tap amplop</p>

</div>

<!-- LETTER PAGE -->
<div class="page hidden" id="letterPage">

  <div class="letter">
    <div class="title">Dear kamu,</div>
    <div class="text" id="typingText"></div>
    <div class="signature">your biggest fan ♡</div>
  </div>

</div>

<script>

function checkPassword(){

  const password = document.getElementById("passwordInput").value.trim();

  if(password === "sayang"){

    document.getElementById("passwordPage").classList.add("hidden");
    document.getElementById("envelopePage").classList.remove("hidden");

  }else{
    alert("password salah 😭");
  }

}

// ENTER support
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    checkPassword();
  }
});

function openLetter(){

  document.getElementById("envelopePage").classList.add("hidden");
  document.getElementById("letterPage").classList.remove("hidden");

  const text = `mungkin aku ga selalu bilang secara langsung, tapi aku beneran bersyukur banget bisa kenal dan sedeket ini sama kamu.
  aku harap setelah banyak hal yang kamu lewatin sejauh ini, 
  kamu dapet lebih banyak hari baik, lebih banyak alasan buat senyum, dan lebih banyak momen yang bikin hati kamu tenang.
  less overthinking, less sadness, less doubting yourself.
  karena sejujurnya, kamu jauh lebih berharga daripada yang kamu pikirin. Makasih yaa udah bertahan sampai sekarang.
  makasiih karena masih milih buat tetep jalan walaupun kadang hidup ga selalu sesuai yang kamu mau.
  dan makasih juga karena udah jadi seseorang yang bikin hari-hari aku terasa lebih ringan.
  Today is all about loving yourself a little more.
  jadi coba bahagiain diri kamu juga yaa.
  makan makanan favorit kamu, tidur yang cukup, denger lagu yang kamu suka, dan nikmatin hari-hari kamu pelan-pelan.
  i hope life treats you gently.
  i hope the universe gives you so many beautiful things.
  dan aku harap semua doa baik yang diam-diam kamu simpan bisa satu-satu jadi kenyataan.
   thank you for existing.
   thank you for staying.`;

  let i = 0;
  const el = document.getElementById("typingText");
  el.innerHTML = "";

  const typing = setInterval(() => {

    el.innerHTML += text.charAt(i);
    i++;

    if(i >= text.length){
      clearInterval(typing);
    }

  }, 28);

}

</script>

</body>
</html>
