<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you ♡</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#0f0f0f;
  font-family:sans-serif;
}

/* SCREEN SYSTEM */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ONLY GIFT FIRST */
#giftScreen{display:flex;}

.card{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:16px;
  text-align:center;
  color:white;
  cursor:pointer;
  width:240px;
}

.icon{font-size:70px;}

/* LOADING */
.loader{
  width:45px;
  height:45px;
  border:3px solid #444;
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* PASSWORD */
.box{
  width:270px;
  padding:25px;
  border-radius:16px;
  background:rgba(255,255,255,0.08);
  color:white;
  text-align:center;
  backdrop-filter:blur(10px);
}

input{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* ENVELOPE */
.wrapper{
  position:relative;
  width:280px;
  height:200px;
}

.envelope{
  width:100%;
  height:180px;
  background:#eee;
  border-radius:12px;
  position:absolute;
  bottom:0;
  cursor:pointer;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#ddd,#bbb);
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER */
.letter{
  position:absolute;
  left:50%;
  bottom:20px;
  transform:translateX(-50%) translateY(40px) scale(0.9);
  width:320px;
  opacity:0;
  transition:1s ease;
  border-radius:10px;
}

.letter.show{
  opacity:1;
  transform:translateX(-50%) translateY(-140px) scale(1);
}

</style>
</head>

<body>

<!-- 🎁 GIFT -->
<div class="screen" id="giftScreen">
  <div class="card" onclick="toLoading()">
    <div class="icon">🎁</div>
    <p>open gift</p>
  </div>
</div>

<!-- ⏳ LOADING -->
<div class="screen" id="loadingScreen">
  <div class="loader"></div>
</div>

<!-- 🔒 PASSWORD -->
<div class="screen" id="pwScreen">
  <div class="box">
    <p>enter password</p>
    <input id="pw" type="password">
    <button onclick="check()">open</button>
  </div>
</div>

<!-- 💌 ENVELOPE -->
<div class="screen" id="envScreen">

  <div class="wrapper">
    <div class="envelope" onclick="openLetter()"></div>

    <div class="letter" id="letter">
      <img src="https://files.catbox.moe/5jqk3h.png" width="320">
      <button onclick="download()">download</button>
    </div>
  </div>

</div>

<script>

/* GIFT → LOADING */
function toLoading(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("loadingScreen").style.display="flex";

  setTimeout(()=>{
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("pwScreen").style.display="flex";
  },2000);
}

/* PASSWORD */
function check(){
  let pw=document.getElementById("pw").value;

  if(pw==="zaki"){
    document.getElementById("pwScreen").style.display="none";
    document.getElementById("envScreen").style.display="flex";
  }else{
    alert("wrong password");
  }
}

/* OPEN LETTER */
function openLetter(){
  document.getElementById("letter").classList.add("show");
}

/* DOWNLOAD */
function download(){
  const link=document.createElement("a");
  link.href="https://files.catbox.moe/5jqk3h.png";
  link.download="letter.png";
  link.click();
}

</script>

</body>
</html>
