<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you ♡</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:sans-serif;
  background:#0f0f0f;
}

/* ALL SCREEN DEFAULT HIDDEN */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

/* ONLY GIFT SHOW FIRST */
#giftScreen{
  display:flex;
  flex-direction:column;
}

.giftBox{
  font-size:90px;
  cursor:pointer;
  animation:float 2s ease-in-out infinite;
}

@keyframes float{
  50%{transform:translateY(-10px);}
}

/* LOADING */
.loader{
  width:45px;
  height:45px;
  border:3px solid #444;
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* PASSWORD */
.box{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:12px;
  color:white;
  text-align:center;
  backdrop-filter:blur(10px);
}

input{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* ENVELOPE */
.envelope{
  width:280px;
  height:180px;
  background:#eee;
  border-radius:12px;
  position:relative;
  cursor:pointer;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#ddd,#bbb);
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER */
.letter{
  position:absolute;
  width:320px;
  opacity:0;
  transform:translateY(50px);
  transition:1s ease;
}

.letter.show{
  opacity:1;
  transform:translateY(-130px);
}

/* FULLSCREEN */
.fullscreen{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.fullscreen.show{
  display:flex;
}

.fullscreen img{
  width:90%;
  max-width:500px;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- 🎁 GIFT -->
<div class="screen" id="giftScreen">
  <div class="giftBox" onclick="start()">🎁</div>
</div>

<!-- ⏳ LOADING -->
<div class="screen" id="loadingScreen">
  <div class="loader"></div>
</div>

<!-- 🔒 PASSWORD -->
<div class="screen" id="passwordScreen">
  <div class="box">
    <p>enter password</p>
    <input type="password" id="pw">
    <button onclick="check()">open</button>
  </div>
</div>

<!-- 💌 SCENE -->
<div class="screen" id="scene">
  <div class="envelope" onclick="openLetter()"></div>

  <div class="letter" id="letter">
    <img src="https://files.catbox.moe/5jqk3h.png" width="320">
  </div>
</div>

<!-- FULLSCREEN -->
<div class="fullscreen" id="full">
  <img src="https://files.catbox.moe/5jqk3h.png">
</div>

<script>

/* START FLOW */
function start(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("loadingScreen").style.display="flex";

  setTimeout(()=>{
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("passwordScreen").style.display="flex";
  },2500);
}

/* PASSWORD CHECK */
function check(){
  let pw=document.getElementById("pw").value;

  if(pw==="zaki"){
    document.getElementById("passwordScreen").style.display="none";
    document.getElementById("scene").style.display="flex";
  }else{
    alert("wrong password");
  }
}

/* OPEN LETTER */
function openLetter(){
  document.getElementById("letter").classList.add("show");

  setTimeout(()=>{
    document.getElementById("full").classList.add("show");
  },1200);
}

</script>

</body>
</html>
