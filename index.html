<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  background:#f7efe9;
  font-family:'Poppins',sans-serif;
}

/* SCREEN */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* FIRST */
#giftScreen{display:flex;}

/* 🎁 VALENTINE GIFT */
.gift{
  width:180px;
  height:180px;
  background:linear-gradient(135deg,#ff7f9c,#ffc1cc);
  border-radius:22px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:60px;
  cursor:pointer;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

.giftText{
  margin-top:12px;
  color:#7a5c52;
}

/* PASSWORD */
.box{
  width:280px;
  padding:28px;
  background:#fff;
  border-radius:18px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #e6d8cf;
  border-radius:10px;
  outline:none;
  background:#fff7f3;
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#caa08c;
  color:white;
}

/* ENVELOPE */
.wrapper{
  width:310px;
  height:220px;
  position:relative;
}

/* envelope */
.envelope{
  width:100%;
  height:180px;
  background:#fff;
  border-radius:14px;
  position:absolute;
  bottom:0;
  cursor:pointer;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

/* flap */
.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:#f3e4da;
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER */
.letter{
  position:absolute;
  left:50%;
  bottom:20px;

  transform:translateX(-50%) translateY(40px);
  opacity:0;

  transition:0.6s ease;

  width:340px;
}

.letter.open{
  transform:translateX(-50%) translateY(-165px);
  opacity:1;
}

.letter img{
  width:100%;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* hint */
.hint{
  margin-top:8px;
  font-size:12px;
  text-align:center;
  color:#7a5c52;
}

</style>
</head>

<body>

<!-- 🎁 GIFT -->
<div class="screen" id="giftScreen">
  <div>
    <div class="gift" onclick="toPW()">🎁</div>
    <div class="giftText">for someone special ♡</div>
  </div>
</div>

<!-- 🔒 PASSWORD -->
<div class="screen" id="pwScreen">
  <div class="box">
    <p>enter password</p>
    <input id="pw" type="password">
    <button onclick="check()">open</button>
  </div>
</div>

<!-- 💌 ENVELOPE -->
<div class="screen" id="envScreen">

  <div class="wrapper">

    <div class="envelope" onclick="toggleLetter()"></div>

    <div class="letter" id="letter">
      <img src="https://files.catbox.moe/5jqk3h.png">
      <div class="hint">tap again to close ♡</div>
    </div>

  </div>

</div>

<script>

let opened=false;

/* gift → pw */
function toPW(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("pwScreen").style.display="flex";
}

/* password */
function check(){
  let pw=document.getElementById("pw").value;

  if(pw==="zaki"){
    document.getElementById("pwScreen").style.display="none";
    document.getElementById("envScreen").style.display="flex";
  }else{
    alert("wrong password :(");
  }
}

/* toggle letter */
function toggleLetter(){

  const letter=document.getElementById("letter");

  if(!opened){
    letter.classList.add("open");
    opened=true;
  }else{
    letter.classList.remove("open");
    opened=false;
  }
}

</script>

</body>
</html>
