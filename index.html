<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:sans-serif;
  background:radial-gradient(circle,#1a1a1a,#0b0b0b);
}

/* 🎁 GIFT */
.giftScreen{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.giftBox{
  font-size:90px;
  cursor:pointer;
  animation:float 2s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(255,255,255,0.2));
}

@keyframes float{
  50%{transform:translateY(-10px);}
}

/* 🎈 LOADING */
.loading{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.7);
  color:white;
}

.loader{
  width:45px;
  height:45px;
  border:3px solid #444;
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* 🔒 PASSWORD */
.passwordScreen{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.box{
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:15px;
  color:white;
  text-align:center;
  backdrop-filter:blur(10px);
}

input{
  margin-top:10px;
  padding:10px;
  width:100%;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* 💌 SCENE */
.scene{
  display:none;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ENVELOPE */
.envelope{
  width:280px;
  height:180px;
  background:#eee;
  border-radius:12px;
  position:relative;
  cursor:pointer;
  box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#ddd,#bbb);
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER */
.letter{
  position:absolute;
  width:340px;
  opacity:0;
  transform:translateY(60px) scale(0.9);
  transition:1.2s ease;
  filter:blur(8px);
}

.letter.show{
  opacity:1;
  transform:translateY(-150px) scale(1);
  filter:blur(0);
}

/* FULLSCREEN */
.fullscreen{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.8);
}

.fullscreen.show{
  display:flex;
}

.fullscreen img{
  width:90%;
  max-width:520px;
  border-radius:12px;
}

</style>
</head>

<body>

<!-- 🎁 KADO -->
<div class="giftScreen" id="giftScreen">
  <div class="giftBox" onclick="start()">🎁</div>
</div>

<!-- ⏳ LOADING -->
<div class="loading" id="loading">
  <div class="loader"></div>
  <p>opening gift...</p>
</div>

<!-- 🔒 PASSWORD -->
<div class="passwordScreen" id="passwordScreen">
  <div class="box">
    <div>enter password</div>
    <input type="password" id="pw">
    <button onclick="check()">open</button>
  </div>
</div>

<!-- 💌 SCENE -->
<div class="scene" id="scene">

  <div class="envelope" onclick="openLetter()"></div>

  <div class="letter" id="letter">
    <img src="https://files.catbox.moe/5jqk3h.png" width="320">
  </div>

</div>

<!-- FULLSCREEN -->
<div class="fullscreen" id="full">
  <img src="https://files.catbox.moe/5jqk3h.png">
  <button onclick="download()">download this letter</button>
</div>

<script>

function start(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("loading").style.display="flex";

  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    document.getElementById("passwordScreen").style.display="flex";
  },2500);
}

function check(){
  let pw=document.getElementById("pw").value;

  if(pw==="zaki"){
    document.getElementById("passwordScreen").style.display="none";
    document.getElementById("scene").style.display="flex";
  }else{
    alert("wrong password");
  }
}

function openLetter(){
  document.getElementById("letter").classList.add("show");

  setTimeout(()=>{
    document.getElementById("full").classList.add("show");
  },1200);
}

function download(){
  const link=document.createElement("a");
  link.href="https://files.catbox.moe/5jqk3h.png";
  link.download="letter.png";
  link.click();
}

</script>

</body>
</html>
