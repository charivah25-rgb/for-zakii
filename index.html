<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#1e1e1e,#0f0f0f);
}

/* ✨ particles */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  opacity:0.3;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* 🎁 GIFT */
.giftScreen{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:300;
  backdrop-filter:blur(8px);
}

.giftBox{
  font-size:90px;
  cursor:pointer;
  animation:glow 2s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(255,255,255,0.2));
}

@keyframes glow{
  50%{transform:translateY(-10px) scale(1.05);}
}

.giftText{
  color:#aaa;
  margin-top:10px;
  font-size:13px;
}

/* ⏳ LOADING */
.loading{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.loader{
  width:50px;
  height:50px;
  border:3px solid #444;
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.loading p{
  margin-top:15px;
  color:#ccc;
  letter-spacing:1px;
}

/* 🔒 PASSWORD */
.passwordScreen{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
}

.box{
  width:260px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  padding:25px;
  border-radius:15px;
  text-align:center;
  color:white;
  transition:0.3s;
}

.box.shake{
  animation:shake 0.3s;
}

@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  75%{transform:translateX(5px);}
}

input{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
  outline:none;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  cursor:pointer;
}

/* 💌 SCENE */
.scene{
  display:none;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ENVELOPE */
.envelope{
  width:280px;
  height:180px;
  background:#f5f5f5;
  border-radius:12px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  position:relative;
  cursor:pointer;
  animation:appear 1s ease forwards;
}

@keyframes appear{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#e0e0e0,#cfcfcf);
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER */
.letter{
  position:absolute;
  width:340px;
  opacity:0;
  transform:translateY(60px) scale(0.9);
  transition:1.2s ease;
  filter:blur(8px);
}

.letter.show{
  opacity:1;
  transform:translateY(-150px) scale(1);
  filter:blur(0);
}

/* FULLSCREEN */
.fullscreen{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  backdrop-filter:blur(8px);
}

.fullscreen.show{
  display:flex;
}

.fullscreen img{
  width:90%;
  max-width:520px;
  border-radius:14px;
  box-shadow:0 30px 80px rgba(0,0,0,0.8);
  animation:pop 0.6s ease;
}

@keyframes pop{
  from{transform:scale(0.95);}
  to{transform:scale(1);}
}

</style>
</head>

<body>

<!-- particles -->
<script>
for(let i=0;i<20;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(p);
}
</script>

<!-- GIFT -->
<div class="giftScreen" id="giftScreen">
  <div class="giftBox" onclick="start()">🎁</div>
  <div class="giftText">tap to open</div>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="loader"></div>
  <p>opening your memory...</p>
</div>

<!-- PASSWORD -->
<div class="passwordScreen" id="passwordScreen">
  <div class="box" id="box">
    enter password
    <input type="password" id="pw">
    <button onclick="check()">open</button>
  </div>
</div>

<!-- SCENE -->
<div class="scene" id="scene">

  <div class="envelope" onclick="openLetter()"></div>

  <div class="letter" id="letter">
    <img src="https://files.catbox.moe/5jqk3h.png">
  </div>

</div>

<!-- FULLSCREEN -->
<div class="fullscreen" id="full">
  <img src="https://files.catbox.moe/5jqk3h.png">
  <button onclick="download()">download this letter</button>
</div>

<script>

function start(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("loading").style.display="flex";

  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    document.getElementById("passwordScreen").style.display="flex";
  },3000);
}

function check(){
  let pw=document.getElementById("pw").value;
  let box=document.getElementById("box");

  if(pw==="zaki"){
    document.getElementById("passwordScreen").style.display="none";
    document.getElementById("scene").style.display="flex";
  }else{
    box.classList.add("shake");
    setTimeout(()=>box.classList.remove("shake"),300);
  }
}

function openLetter(){
  document.getElementById("letter").classList.add("show");

  setTimeout(()=>{
    document.getElementById("full").classList.add("show");
  },1200);
}

function download(){
  const link=document.createElement("a");
  link.href="https://files.catbox.moe/5jqk3h.png";
  link.download="letter.png";
  link.click();
}

</script>

</body>
</html>
