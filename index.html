<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you ♡</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#f3eee9; /* soft cream biar cocok sama surat */
  font-family:sans-serif;
}

/* SCREEN */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ONLY FIRST */
#giftScreen{display:flex;}

/* CARD */
.card{
  background:white;
  padding:25px;
  border-radius:16px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* PASSWORD (clean aesthetic) */
.box{
  width:280px;
  padding:25px;
  border-radius:16px;
  background:white;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#c7b7a3;
  color:white;
  cursor:pointer;
}

/* ENVELOPE */
.wrapper{
  width:300px;
  height:220px;
  position:relative;
}

/* envelope simple aesthetic */
.envelope{
  width:100%;
  height:180px;
  background:#ffffff;
  border-radius:12px;
  position:absolute;
  bottom:0;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* flap */
.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:#f0e7df;
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER */
.letter{
  position:absolute;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  width:320px;
  display:none;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

</style>
</head>

<body>

<!-- 🎁 GIFT -->
<div class="screen" id="giftScreen">
  <div class="card" onclick="next()">🎁 open gift</div>
</div>

<!-- 🔒 PASSWORD -->
<div class="screen" id="pwScreen">
  <div class="box">
    <p>enter password</p>
    <input type="password" id="pw">
    <button onclick="check()">open</button>
  </div>
</div>

<!-- 💌 ENVELOPE -->
<div class="screen" id="envScreen">

  <div class="wrapper">

    <div class="envelope" onclick="openLetter()"></div>

    <div class="letter" id="letter">
      <img src="https://files.catbox.moe/5jqk3h.png" width="320">
    </div>

  </div>

</div>

<script>

/* gift → password */
function next(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("pwScreen").style.display="flex";
}

/* password */
function check(){
  let pw=document.getElementById("pw").value;

  if(pw==="zaki"){
    document.getElementById("pwScreen").style.display="none";
    document.getElementById("envScreen").style.display="flex";
  }else{
    alert("wrong password");
  }
}

/* open letter */
function openLetter(){
  document.getElementById("letter").style.display="block";
}

</script>

</body>
</html>
