<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f2ee;
  overflow:hidden;
  font-family:sans-serif;
}

/* ENVELOPE */
.envelope{
  width:280px;
  height:180px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  position:relative;
  cursor:pointer;
}

.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#e6e3dc,#d8d4cc);
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
}

/* LETTER inside animation */
.letter{
  position:absolute;
  width:260px;
  height:auto;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(0);
  opacity:0;
  transition:1.2s ease;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* keluar pelan */
.letter.show{
  transform:translateX(-50%) translateY(-140px);
  opacity:1;
}

/* FULL SCREEN MODE */
.fullscreen{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.fullscreen.show{
  display:flex;
}

.fullscreen img{
  width:90%;
  max-width:500px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* BUTTON */
button{
  margin-top:15px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="envelope" onclick="openLetter()"></div>

<!-- LETTER (keluar pelan) -->
<img class="letter" id="letter" src="https://files.catbox.moe/5jqk3h.png">

<!-- FULLSCREEN -->
<div class="fullscreen" id="full">
  <img src="https://files.catbox.moe/5jqk3h.png">
  <button onclick="download()">download this letter</button>
</div>

<script>

let opened=false;

function openLetter(){

  if(opened) return;
  opened=true;

  // surat keluar pelan
  document.getElementById("letter").classList.add("show");

  // setelah keluar → full screen
  setTimeout(()=>{
    document.getElementById("full").classList.add("show");
  },1200);
}

/* DOWNLOAD */
function download(){
  const link=document.createElement("a");
  link.href="https://files.catbox.moe/5jqk3h.png";
  link.download="letter.png";
  link.click();
}

</script>

</body>
</html>
