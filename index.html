<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  background:#0f0f0f;
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* SCREEN WRAPPER */
.screen{
  display:none;
  width:100%;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ONLY GIFT SHOW FIRST */
#giftScreen{
  display:flex;
}

/* 🎁 CARD */
.giftCard{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  padding:30px;
  border-radius:16px;
  text-align:center;
  cursor:pointer;
  color:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.giftIcon{
  font-size:70px;
}

/* 🌸 bouquet */
.bouquet{
  font-size:70px;
  margin-top:10px;
}

/* 🔒 PASSWORD (aesthetic glass) */
.box{
  width:270px;
  padding:25px;
  border-radius:16px;

  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.2);

  backdrop-filter:blur(12px);

  color:white;
  text-align:center;

  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

input{
  margin-top:12px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:white;
  color:black;
  font-weight:500;
}

/* 💌 LETTER */
.letter{
  width:320px;
  border-radius:12px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<!-- 🎁 GIFT -->
<div class="screen" id="giftScreen">
  <div class="giftCard" onclick="openGift()">
    <div class="giftIcon">🎁</div>
    <p>open your gift</p>
  </div>
</div>

<!-- 🌸 BOUQUET SCREEN -->
<div class="screen" id="bouquetScreen">
  <div class="giftCard" onclick="toPassword()">
    <div class="giftIcon">🎁</div>
    <div class="bouquet">💐</div>
    <p>you got a bouquet</p>
  </div>
</div>

<!-- 🔒 PASSWORD -->
<div class="screen" id="pwScreen">
  <div class="box">
    <p>enter password</p>
    <input type="password" id="pw">
    <button onclick="check()">open</button>
  </div>
</div>

<!-- 💌 LETTER -->
<div class="screen" id="letterScreen">
  <img class="letter" src="https://files.catbox.moe/5jqk3h.png">
</div>

<script>

/* FLOW 1 */
function openGift(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("bouquetScreen").style.display="flex";
}

/* FLOW 2 */
function toPassword(){
  document.getElementById("bouquetScreen").style.display="none";
  document.getElementById("pwScreen").style.display="flex";
}

/* PASSWORD */
function check(){
  let pw=document.getElementById("pw").value;

  if(pw==="zaki"){
    document.getElementById("pwScreen").style.display="none";
    document.getElementById("letterScreen").style.display="flex";
  }else{
    alert("wrong password");
  }
}

</script>

</body>
</html>
