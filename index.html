<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for you ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  background:radial-gradient(circle at top,#1b1b1b,#0b0b0b);
  font-family:'Poppins',sans-serif;
  overflow:hidden;
}

/* SCREEN */
.screen{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ONLY FIRST */
#giftScreen{display:flex;}

/* 🎁 CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(14px);
  padding:30px;
  border-radius:18px;
  text-align:center;
  color:white;
  width:240px;
  cursor:pointer;
  box-shadow:0 25px 70px rgba(0,0,0,0.7);
}

.icon{font-size:70px;}

/* ⏳ LOADING (dream feel) */
.loaderBox{
  text-align:center;
  color:white;
  opacity:0.9;
}

.loader{
  width:45px;
  height:45px;
  border:3px solid rgba(255,255,255,0.2);
  border-top:3px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* 🔒 PASSWORD */
.box{
  width:290px;
  padding:28px;
  border-radius:20px;

  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(18px);

  color:white;
  text-align:center;

  box-shadow:0 30px 80px rgba(0,0,0,0.8);
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  outline:none;
  margin-top:12px;

  background:rgba(255,255,255,0.1);
  color:white;
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:white;
}

/* 💌 ENVELOPE (lebih real lipatan) */
.wrapper{
  position:relative;
  width:300px;
  height:210px;
}

/* body */
.envelope{
  width:100%;
  height:180px;
  background:linear-gradient(135deg,#f3f3f3,#d6d6d6);
  border-radius:14px;
  position:absolute;
  bottom:0;
  cursor:pointer;
  box-shadow:0 25px 60px rgba(0,0,0,0.6);
  overflow:hidden;
}

/* flap */
.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#e5e5e5,#cfcfcf);
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
  transition:0.8s ease;
}

/* open effect */
.envelope.open::before{
  transform:rotateX(180deg);
  transform-origin:top;
}

/* ✨ LETTER */
.letter{
  position:absolute;
  left:50%;
  bottom:20px;

  width:340px;

  transform:translateX(-50%) translateY(60px) scale(0.95);
  opacity:0;
  filter:blur(6px);

  transition:1.2s cubic-bezier(.25,.8,.25,1);
}

.letter.show{
  transform:translateX(-50%) translateY(-160px) scale(1);
  opacity:1;
  filter:blur(0);
}

.letter img{
  width:100%;
  border-radius:12px;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<!-- 🎁 GIFT -->
<div class="screen" id="giftScreen">
  <div class="card" onclick="toLoading()">
    <div class="icon">🎁</div>
    <p>open gift</p>
  </div>
</div>

<!-- ⏳ LOADING -->
<div class="screen" id="loadingScreen">
  <div class="loaderBox">
    <div class="loader"></div>
    <p>opening...</p>
  </div>
</div>

<!-- 🔒 PASSWORD -->
<div class="screen" id="pwScreen">
  <div class="box">
    <p>enter password</p>
    <input type="password" id="pw">
    <button onclick="check()">unlock</button>
  </div>
</div>

<!-- 💌 ENVELOPE -->
<div class="screen" id="envScreen">

  <div class="wrapper">
    <div class="envelope" id="env" onclick="openLetter()"></div>

    <div class="letter" id="letter">
      <img src="https://files.catbox.moe/5jqk3h.png">
    </div>
  </div>

</div>

<script>

/* gift → loading */
function toLoading(){
  document.getElementById("giftScreen").style.display="none";
  document.getElementById("loadingScreen").style.display="flex";

  setTimeout(()=>{
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("pwScreen").style.display="flex";
  },2000);
}

/* password */
function check(){
  let pw=document.getElementById("pw").value;

  if(pw==="zaki"){
    document.getElementById("pwScreen").style.display="none";
    document.getElementById("envScreen").style.display="flex";
  }else{
    alert("wrong password");
  }
}

/* envelope + letter animation */
function openLetter(){
  document.getElementById("env").classList.add("open");
  document.getElementById("letter").classList.add("show");
}

</script>

</body>
</html>
